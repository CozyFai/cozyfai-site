<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tu regalo de CozyFai</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: #fdfaf7; 
            color: #5a4a42; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0;
            text-align: center;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            max-width: 90%;
            width: 400px;
        }
        h1 { font-size: 1.5rem; margin-bottom: 10px; }
        p { margin-bottom: 20px; font-size: 1rem; line-height: 1.4; }
        .btn { 
            display: inline-block; 
            padding: 15px 30px; 
            background-color: #d4a373; 
            color: white; 
            text-decoration: none; 
            border-radius: 50px; 
            font-weight: bold;
            transition: transform 0.2s;
        }
        .btn:active { transform: scale(0.95); }
        .footer { margin-top: 20px; font-size: 0.8rem; opacity: 0.7; }
    </style>
</head>
<body>
    <div class="card">
        <h1>¡Aquí tienes tu dibujo!</h1>
        <p>Gracias por ser parte de <strong>CozyFai</strong>. Haz clic abajo para bajar tu PDF gratuito del gato cozy.</p>
        
        <a href="CozyFai_Free_Cat_Coloring_Page.pdf" class="btn">DESCARGAR PDF</a>
        
        <div class="footer">
            © 2026 CozyFai - Hecho con ❤️
        </div>
    </div>
</body>
</html>
