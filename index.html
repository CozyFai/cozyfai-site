<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cozy Coloring Page – Free Sample | CozyFai</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f6efe6;
      color: #333;
    }

    .container {
      width: 90%;
      max-width: 1100px;
      margin: auto;
    }

    header {
      padding: 5px 0;
      text-align: center;
      font-weight: bold;
      font-size: 20px;
    }

    .hero {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      padding: 20px 0;
    }

    .hero-text {
      flex: 1 1 500px;        
      text-align: center;
    }

    .hero-text h1 {
      font-size: 36px;
      margin-bottom: 20px;
    }

    .hero-text p {
      font-size: 18px;
      margin-bottom: 30px;
    }

    .form-box {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .form-box input {
      padding: 12px;
      flex: 1;
      min-width: 200px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    .form-box button {
      padding: 12px 20px;
      border-radius: 8px;
      border: none;
      background-color: #2bbf9b;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .hero img {
      flex: 1 1 450px;
      max-width: 100%;
      border-radius: 20px;
    }

    .section {
      padding: 60px 0;
      text-align: center;
    }

    .preview img {
      max-width: 300px;
      border-radius: 20px;
      margin-top: 20px;
    }

    footer {
      padding: 30px 0;
      text-align: center;
      font-size: 14px;
      background-color: #eee2d3;
      margin-top: 60px;
    }

    @media (max-width: 768px) {
      .hero {
        flex-direction: column;
        text-align: center;
      }

      .form-box {
        justify-content: center;
      }
    }
  </style>
</head>
<body>

  <header>
    CozyFai
  </header>

  <div class="container">

    <section class="hero">
      <div class="hero-text">
        <h1>Cozy Coloring Page – Free Sample</h1>
        <p>Relaxing printable cozy illustration to unwind, relax and enjoy.</p>

        <form class="form-box">
          <input type="email" placeholder="Enter your email" required>
          <button type="submit">Get it FREE</button>
        </form>
      </div>

      <img src="assets/mockup.jpg" alt="Cozy Coloring Page Preview">
    </section>

    <section class="section preview">
      <h2>What You'll Get</h2>
      <p>✔ High resolution printable PDF<br>
         ✔ Cozy aesthetic lineart<br>
         ✔ Instant download via email</p>

      <img src="assets/preview1.jpg" alt="Preview of coloring page">
    </section>

  </div>

  <footer>
    © 2026 CozyFai – Relax • Unwind • Enjoy
  </footer>

</body>
</html>
