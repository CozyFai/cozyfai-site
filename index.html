<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cozy Coloring Page – Free Sample | CozyFai</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background-color: #f6efe6;
  color: #333;
}

/* CONTAINER */
.container {
  width: 90%;
  max-width: 1100px;
  margin: auto;
}

/* HEADER */
.site-header {
  background-color: #e9e0d3;
  padding: 14px 0;
  border-bottom: 1px solid #e2d8c9;
  text-align: center;
}

.logo {
  height: 22px;
}

/* =========================
   HERO (2 columnas)
========================= */

.hero {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 40px;
  padding: 20px 0 40px 0;
}

.hero-image {
  flex: 1;
}

.hero-image img {
  width: 85%;
  border-radius: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

.hero-text {
  flex: 1;
}

.hero-text h1 {
  font-size: 36px;
  margin: 0 0 18px 0;
  line-height: 1.15;
}

.hero-text h1 span {
  display: block;
  font-size: 24px;
  opacity: 0.8;
  margin-top: 6px;
}

.hero-text p {
  font-size: 18px;
  margin-bottom: 28px;
  max-width: 420px;
}

/* FORM */
.form-box {
  display: flex;
  flex-direction: column;
  gap: 15px;
  max-width: 350px;
}

.form-box input {
  padding: 14px;
  border-radius: 10px;
  border: 1px solid #ccc;
}

.form-box button {
  padding: 16px;
  border-radius: 14px;
  border: none;
  background-color: #1f9e84;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

.form-box button:hover {
  transform: translateY(-2px);
}

/* =========================
   FEATURES (2 columnas)
========================= */

.features {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 60px;
  padding: 40px 0;
}

.features-text {
  flex: 1;
}

.features-text h2 {
  margin-bottom: 18px;
}

.benefits {
  padding-left: 18px;
  line-height: 1.9;
}

.features-image {
  flex: 1;
  text-align: center;
}

.features-image img {
  max-width: 320px;
  border-radius: 20px;
  box-shadow: 0 8px 22px rgba(0,0,0,0.08);
}

.benefits-title {
  font-weight: 600;
  margin: 18px 0 8px 0;
}

.benefits {
  margin: 0 0 26px 18px;
  line-height: 1.9;
}
/* FOOTER */
footer {
  text-align: center;
  padding: 30px 0;
  background-color: #eee2d3;
  margin-top: 60px;
}

/* =========================
   RESPONSIVE
========================= */

@media (max-width: 900px) {

  .hero,
  .features {
    flex-direction: column;
    text-align: center;
  }

  .form-box {
    margin: auto;
  }
}
</style>
</head>

<body>

<header class="site-header">
  <img src="assets/logo.png" alt="CozyFai logo" class="logo">
</header>

<div class="container">

  <!-- HERO -->
  <section class="hero">

    <div class="hero-image">
      <img src="assets/mockup-freebie1-jpg.jpg" alt="Cozy Coloring Page Preview">
    </div>

    <div class="hero-text">
      <h1>
        Cozy Coloring Page
        <span>Free Sample</span>
      </h1>

<p>Relaxing printable cozy illustration to unwind, relax and enjoy.</p>

<p class="benefits-title">What you'll get:</p>

<ul class="benefits">
  <li>High resolution printable PDF</li>
  <li>Cozy aesthetic lineart</li>
  <li>Instant download via email</li>
</ul>

      <form class="form-box">
        <input type="email" placeholder="Enter your email" required>
        <button type="submit">Get it FREE</button>
      </form>
    </div>

  </section>

  <!-- FEATURES -->
  <section class="features">
    <div class="features-image">
      <img src="assets/preview1.jpg" alt="Coloring page preview">
    </div>
  </section>

</div>

<footer>
  © 2026 CozyFai – Relax • Unwind • Enjoy
</footer>

</body>
</html>
