<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cozy Coloring Page – Free Sample | CozyFai</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f6efe6;
      color: #333;
    }

    .container {
      width: 90%;
      max-width: 1100px;
      margin: auto;
    }

    /* HEADER */
    header {
      text-align: center;
      padding: 15px 0;
      font-size: 22px;
      font-weight: bold;
    }

    /* HERO SECTION */
    .hero {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 40px;
      padding: 0px 0 32px 0; /* más compacto arriba */
    }
    
    .hero-image {
      flex: 1;
    }

    .hero-image img {
      width: 85%;
      border-radius: 20px;     
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    .hero-text {
      flex: 1;
    }
    
    .hero-text h1 {
      font-size: 36px;
      margin-top: 0;
      margin-bottom: 20px;
      line-height: 1.15;
    }

    .hero-text p {
      font-size: 18px;
      margin-bottom: 30px;
      line-height: 1.6;
      max-width: 420px;
    }

    .hero-text h1 span {
      font-size: 24px;
      font-weight: 500;
      opacity: 0.8;
    }
    /* FORM */
    .form-box {
      display: flex;
      flex-direction: column;
      gap: 15px;
      max-width: 350px;
    }

    .form-box input {
      padding: 14px;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 15px;
    }

    .form-box button {
      padding: 16px;
      border-radius: 14px;
      border: none;
      background-color: #1f9e84;
      color: white;
      font-weight: bold;
      font-size: 17px;
      cursor: pointer;
    }
    
    .form-box button:hover {
      transform: translateY(-1px);
      opacity: 0.95;
    }
    /* WHAT YOU'LL GET */
    .section {
      text-align: center;
      padding: 40px 0;
    }

    .section h2 {
      margin-bottom: 20px;
    }

    .section p {
      line-height: 1.8;
    }

    .site-header {
      text-align: center;
      /*background-color: #eee2d3; /* un tono apenas más oscuro que el fondo */
      background-color: #e9e0d3;
      padding: 14px 0; /* mucho más compacto */
      border-bottom: 1px solid #e2d8c9;
    }

    .logo {
      height: 20px;   /* ajusta tamaño del logo */
      width: auto;
      display: block;
      margin: 0 auto;
    }
    
    .preview img {
      max-width: 300px;
      margin-top: 30px;
      border-radius: 20px;
    }

    footer {
      text-align: center;
      padding: 30px 0;
      background-color: #eee2d3;
      margin-top: 60px;
      font-size: 14px;
    }

    /* RESPONSIVE */
    @media (max-width: 900px) {
      .hero {
        flex-direction: column;
        text-align: center;
      }

      .form-box {
        margin: auto;
      }
    }

  </style>
</head>
<body>

<header class="site-header">
  <img src="assets/logo.png" alt="CozyFai logo" class="logo">
</header>

  <div class="container">

    <!-- HERO -->
    <section class="hero">

      <div class="hero-image">
        <img src="assets/mockup-freebie1-jpg.jpg" alt="Cozy Coloring Page Preview">
      </div>

      <div class="hero-text">
        <h1>
          Cozy Coloring Page <br>
          <span>Free Sample</span>
        </h1>
        <p>Relaxing printable cozy illustration to unwind, relax and enjoy.</p>

        <form class="form-box">
          <input type="email" placeholder="Enter your email" required>
          <button type="submit">Get it FREE</button>
        </form>
      </div>

    </section>

    <!-- WHAT YOU'LL GET -->
    <section class="section">
      <h2>What You'll Get</h2>
      <p>
        ✔ High resolution printable PDF<br>
        ✔ Cozy aesthetic lineart<br>
        ✔ Instant download via email
      </p>
    </section>

    <!-- PREVIEW -->
    <section class="section preview">
      <h2>Preview of coloring page</h2>
      <img src="assets/preview1.jpg" alt="Coloring page preview">
    </section>

  </div>

  <footer>
    © 2026 CozyFai – Relax • Unwind • Enjoy
  </footer>

</body>
</html>
