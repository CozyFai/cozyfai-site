<!DOCTYPE html>
<html lang="en">
<head>
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You're in ✨ | CozyFai</title>
  
  <style>
    /* 1. Mantenemos el estilo de body de la Landing para consistencia */
    body {
      margin: 0;
      font-family: Arial, sans-serif; /* 🔥 Cambiado a Sans-serif para coherencia */
      background-color: #f6efe6;
      color: #333;
      text-align: center;
    }

    /* 2. Integramos el Header idéntico al de la Landing */
    .site-header {
      background-color: #e9e0d3;
      padding: 10px 0;
      border-bottom: 1px solid #e2d8c9;
      margin-bottom: 20px;
    }

    .logo {
      height: 20px;
    }

    .container {
      width: 90%;
      max-width: 600px; /* Más angosto para tipo "tarjeta" */
      margin: auto;
      padding-bottom: 60px;
    }

    /* 3. Compactamos el Título Principal */
    h1 {
      font-size: 28px; /* 🔥 Más pequeño y Sans-serif */
      margin: 0 0 15px 0;
      color: #2c2c2c;
    }

    /* 4. Estilos de texto Sans-serif y compactos */
    p {
      color: #666;
      font-size: 16px;
      line-height: 1.5;
      margin: 0 0 25px 0;
    }

    .p-downloading {
      font-size: 17px;
      margin-bottom: 10px;
    }

    .download-btn {
      display: inline-block;
      padding: 14px 28px;
      background-color: #1f9e84; /* Mismo color de la Landing */
      color: #fff;
      text-decoration: none;
      border-radius: 10px;
      font-weight: 600;
      font-size: 16px;
      transition: 0.3s;
      margin-bottom: 8px;
    }

    .download-btn:hover {
      transform: translateY(-2px);
      background-color: #1a8a73;
    }

    .small-text {
      font-size: 13px;
      color: #999;
      margin-bottom: 30px;
    }
    
    /* 5. Sección Upsell Coherente */
    .upsell {
      margin-top: 30px;
      padding-top: 25px;
      border-top: 1px solid #e2d8c9;
      background-color: #fffaf5; /* Fondo suave para destacar */
      border-radius: 20px;
      padding: 20px;
    }

    .upsell h2 {
      font-size: 22px;
      margin: 0 0 10px 0;
      color: #2c2c2c;
    }

    .preview-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin: 15px 0 20px 0;
    }

    .preview-grid img {
      width: 100%;
      border-radius: 8px;
      object-fit: cover;
      box-shadow: 0 6px 15px rgba(0,0,0,0.07);
      border: 2px solid #e6e3df;
      cursor: zoom-in;
      transition: transform .2s ease;
    }
    
    .preview-grid img:hover { transform: scale(1.03); }

    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }
    
    .lightbox img { max-width: 90%; max-height: 90%; border-radius: 12px; }
    
    .pack-btn {
      display: inline-block;
      padding: 13px 26px;
      background-color: #333; /* Mismo color que el botón secundario en PC */
      color: white;
      text-decoration: none;
      border-radius: 10px;
      font-weight: 600;
      font-size: 15px;
      transition: 0.3s;
    }

    @media (max-width: 500px) {
      .preview-grid { grid-template-columns: repeat(2, 1fr); }
      h1 { font-size: 24px; }
      .upsell h2 { font-size: 20px; }
    }
  </style>
</head>

<body>
    <header class="site-header">
      <img src="assets/logo.png" alt="CozyFai logo" class="logo">
    </header>

    <script>
      /* Mismo script de seguridad y auto-descarga (mantener igual) */
      function validateAccess() {
        const params = new URLSearchParams(window.location.search);
        if (params.get("from") !== "landing") {
          window.location.replace("/");
          return;
        }
        window.history.replaceState({}, "", "/thank-you.html");
      }
      
      validateAccess();

      window.addEventListener('load', function() {
        setTimeout(function() {
          const downloadUrl = "/assets/cozyfai-coloring-page-free-sample.pdf";
          const link = document.createElement('a');
          link.href = downloadUrl;
          link.download = "Cozy_Cat_Coloring_Page_CozyFai.pdf"; 
          document.body.appendChild(link);
          link.click();
          document.body.removeChild(link);
        }, 1500); 
      });
    </script>

  <div class="container">
    <div class="thankyou-card">
      <h1>You're in ✨</h1>

      <p class="p-downloading">
        Your coloring page is downloading automatically.<br>
        Take a deep breath and enjoy.
      </p>

      <a href="/assets/cozyfai-coloring-page-free-sample.pdf" class="download-btn" download id="manualDownload">
        Download manually if it didn't start
      </a>

      <p class="small-text">
        We've also sent a copy to your email 🌿
      </p>

      <div class="upsell">
        <h2>✨ Want more cozy designs?</h2>
        <p>Check out our 6-page printable pack.</p>

        <div class="preview-grid">
          <img src="/assets/preview1-small.webp" data-large="/assets/preview1-large.webp" alt="Preview 1">
          <img src="/assets/preview2-small.webp" data-large="/assets/preview2-large.webp" alt="Preview 2">
          <img src="/assets/preview3-small.webp" data-large="/assets/preview3-large.webp" alt="Preview 3">
          <img src="/assets/preview4-small.webp" data-large="/assets/preview4-large.webp" alt="Preview 4">
          <img src="/assets/preview5-small.webp" data-large="/assets/preview5-large.webp" alt="Preview 5">
          <img src="/assets/preview6-small.webp" data-large="/assets/preview6-large.webp" alt="Preview 6">
        </div>

        <a href="https://cozyfai.gumroad.com/l/cozy-home-vibes-coloring-pack" class="pack-btn">
          View the full pack
        </a>
      </div>
    </div>
  </div>
  
  <div class="lightbox" id="lightbox">
    <img id="lightbox-img" src="">
  </div>

  <script>
    /* Mismo script de lightbox (mantener igual) */
    const previews = document.querySelectorAll(".preview-grid img");
    const lightbox = document.getElementById("lightbox");
    const lightboxImg = document.getElementById("lightbox-img");

    previews.forEach(img => {
      img.addEventListener("click", () => {
        const largeSrc = img.getAttribute("data-large");
        lightboxImg.src = largeSrc;
        lightbox.style.display = "flex";
      });
    });

    lightbox.addEventListener("click", () => {
      lightbox.style.display = "none";
      lightboxImg.src = "";
    });
  </script>
</body>
</html>
